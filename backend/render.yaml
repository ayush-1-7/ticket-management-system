services:
  - type: web
    name: ticket-management-api
    env: python
    region: oregon
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./tickets.db
      - key: PYTHON_VERSION
        value: "3.11.9"
